spring:
  application:
    name: movie-reservation-service

  datasource:
    url: jdbc:postgresql://localhost:5432/movie_reservation
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: 1234
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
          fetch_size: 100
        format_sql: false
        show_sql: false
        use_sql_comments: false
        default_batch_fetch_size: 20
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mail:
    host: smtp.gmail.com
    port: 587
    username:
    password:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-must-be-at-least-32-characters}
  expiration: 86400000 # 24 hours in milliseconds

server:
  port: 8088
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 20000

logging:
  level:
    com.movie.reservation: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/movie-reservation.log
    max-size: 10MB
    max-history: 30

# Custom application properties
app:
  reservation:
    payment-window-minutes: 15
    max-seats-per-reservation: 10
    cancellation-hours-before: 2
  scheduling:
    expire-pending-reservations: "0 * * * * *" # every minute
    cleanup-old-data: "0 0 0 * * *" # daily at midnight